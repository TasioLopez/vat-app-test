app = 'vat-gotenberg'
primary_region = 'ams'

[build]
  image = 'gotenberg/gotenberg:8'

[env]
  API_TIMEOUT = '120s'
  API_START_TIMEOUT = '120s'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
